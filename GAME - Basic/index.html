<!DOCTYPE HTML>
<HTML>
	<HEAD>
		<TITLE>3D GAME</TITLE>
		<LINK rel="stylesheet" href="style.css">
		<meta charset="utf-8">
	</HEAD>
	
	<BODY>
		<div id="container">
			<div id="world"></div>
			<div id="menu1" class="menu" style="display:block">
				<div id="button1" class="button">
					<p>Start game</p>
				</div>
				<div id="button2" class="button">
					<p>Intructions</p>
				</div>
			</div>
			<div id="menu2" class="menu">
				<p style="font-size:30px;top:200px;">
					<strong>Control keys</strong><br>
					w - Go Forward<br>
					s - Go Back<br>
					d - Go Right<br>
					a - Go Left<br>
					Space - Jumping<br>
					You can play using English keyboard!
				</p>
				<div id="button3" class="button">
					<p>Back</p>
				</div>
			</div>
		</div>
	</BODY>
</HTML>
<script src="script.js"></script>
<script src="menu.js"></script>
